name: Deploy

on:
  push:
    branches: [main]

env:
  AWS_REGION: eu-west-2
  TF_VERSION: "1.6.0"
  PROJECT: url-demo-project

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run tests
        run: |
          pip install -r app/requirements.txt pytest
          pytest app/tests/ -v

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: ${{ secrets.AWS_ROLE_SESSION_NAME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          SHA_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$PROJECT/api:latest -t $ECR_REGISTRY/$PROJECT/api:$SHA_TAG ./app
          docker build -t $ECR_REGISTRY/$PROJECT/worker:latest -t $ECR_REGISTRY/$PROJECT/worker:$SHA_TAG ./services/worker
          docker build -t $ECR_REGISTRY/$PROJECT/dashboard:latest -t $ECR_REGISTRY/$PROJECT/dashboard:$SHA_TAG ./services/dashboard

      - name: Trivy scan — api
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.PROJECT }}/api:latest
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Trivy scan — worker
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.PROJECT }}/worker:latest
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Trivy scan — dashboard
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.PROJECT }}/dashboard:latest
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Push images to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          SHA_TAG: ${{ github.sha }}
        run: |
          for svc in api worker dashboard; do
            docker push $ECR_REGISTRY/$PROJECT/$svc:latest
            docker push $ECR_REGISTRY/$PROJECT/$svc:$SHA_TAG
          done

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: terraform
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}
        run: terraform apply -auto-approve tfplan

      - name: Update ECS task definitions
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          SHA_TAG: ${{ github.sha }}
        run: |
          for svc in api worker dashboard; do
            TASK_DEF=$(aws ecs describe-task-definition \
              --task-definition $PROJECT-$svc \
              --query 'taskDefinition' --output json | \
              jq --arg img "$ECR_REGISTRY/$PROJECT/$svc:$SHA_TAG" \
              '.containerDefinitions[0].image = $img | del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.placementConstraints,.compatibilities,.registeredAt,.registeredBy)')

            NEW_REVISION=$(aws ecs register-task-definition \
              --cli-input-json "$TASK_DEF" \
              --query 'taskDefinition.taskDefinitionArn' --output text)

            aws ecs update-service \
              --cluster $PROJECT \
              --service $PROJECT-$svc \
              --task-definition $NEW_REVISION
          done

      - name: Wait for services to stabilize
        run: |
          for svc in api worker dashboard; do
            aws ecs wait services-stable \
              --cluster $PROJECT \
              --services $PROJECT-$svc
          done
        timeout-minutes: 10

      - name: Smoke test
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://url.hamsa-ahmed.co.uk/healthz)
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test failed — /healthz returned HTTP $STATUS"
            exit 1
          fi
          echo "Smoke test passed — HTTP $STATUS"

      - name: Rollback on failure
        if: failure()
        run: |
          for svc in api worker dashboard; do
            PREV=$(aws ecs describe-services \
              --cluster $PROJECT \
              --services $PROJECT-$svc \
              --query 'services[0].deployments[-1].taskDefinition' \
              --output text)
            aws ecs update-service \
              --cluster $PROJECT \
              --service $PROJECT-$svc \
              --task-definition $PREV
          done

      - name: Post deployment summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? '✅ Deployed' : '❌ Failed';
            const sha = '${{ github.sha }}'.substring(0, 7);
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `${status} — commit \`${sha}\` to ECS (eu-west-2) — https://url.hamsa-ahmed.co.uk`
            });

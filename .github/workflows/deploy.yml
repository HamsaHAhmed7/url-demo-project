name: Deploy

on:
  push:
    branches: [main]

env:
  AWS_REGION: eu-west-2
  TF_VERSION: "1.6.0"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run tests
        run: |
          pip install -r app/requirements.txt pytest
          pytest app/tests/ -v

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: ${{ secrets.AWS_ROLE_SESSION_NAME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          SHA_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/project-demo/api:latest -t $ECR_REGISTRY/project-demo/api:$SHA_TAG ./app
          docker build -t $ECR_REGISTRY/project-demo/worker:latest -t $ECR_REGISTRY/project-demo/worker:$SHA_TAG ./services/worker
          docker build -t $ECR_REGISTRY/project-demo/dashboard:latest -t $ECR_REGISTRY/project-demo/dashboard:$SHA_TAG ./services/dashboard

      - name: Scan images with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: project-demo/api:latest
          format: table
          exit-code: 1
          severity: CRITICAL

      - name: Push images to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          SHA_TAG: ${{ github.sha }}
        run: |
          docker push $ECR_REGISTRY/project-demo/api:latest
          docker push $ECR_REGISTRY/project-demo/api:$SHA_TAG
          docker push $ECR_REGISTRY/project-demo/worker:latest
          docker push $ECR_REGISTRY/project-demo/worker:$SHA_TAG
          docker push $ECR_REGISTRY/project-demo/dashboard:latest
          docker push $ECR_REGISTRY/project-demo/dashboard:$SHA_TAG

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: terraform
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}
        run: terraform apply -auto-approve tfplan

      - name: Update ECS services
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          SHA_TAG: ${{ github.sha }}
        run: |
          for service in api worker dashboard; do
            TASK_DEF=$(aws ecs describe-task-definition \
              --task-definition project-demo-$service \
              --query 'taskDefinition' --output json | \
              jq --arg img "$ECR_REGISTRY/project-demo/$service:$SHA_TAG" \
              '.containerDefinitions[0].image = $img')

            NEW_REVISION=$(aws ecs register-task-definition \
              --cli-input-json "$TASK_DEF" \
              --query 'taskDefinition.taskDefinitionArn' --output text)

            aws ecs update-service \
              --cluster project-demo \
              --service project-demo-$service \
              --task-definition $NEW_REVISION
          done

      - name: Wait for services to stabilize
        run: |
          for service in api worker dashboard; do
            aws ecs wait services-stable \
              --cluster project-demo \
              --services project-demo-$service
          done
        timeout-minutes: 10

      - name: Rollback on failure
        if: failure()
        run: |
          for service in api worker dashboard; do
            PREV=$(aws ecs describe-services \
              --cluster project-demo \
              --services project-demo-$service \
              --query 'services[0].deployments[-1].taskDefinition' \
              --output text)
            aws ecs update-service \
              --cluster project-demo \
              --service project-demo-$service \
              --task-definition $PREV
          done

      - name: Post deployment summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? '✅ Deployed' : '❌ Failed';
            const sha = '${{ github.sha }}'.substring(0, 7);
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `${status} — commit \`${sha}\` to ECS (eu-west-2)`
            });

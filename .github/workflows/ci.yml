name: CI

on:
  pull_request:
    branches: [main]

env:
  AWS_REGION: eu-west-2
  TF_VERSION: "1.6.0"

jobs:

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install tools
        run: pip install bandit pip-audit
      - name: Bandit SAST
        run: bandit -r app/src/ -ll -ii
      - name: pip-audit dependency scan
        run: pip-audit -r app/requirements.txt

  sast-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - name: govulncheck — worker
        working-directory: services/worker
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
      - name: govulncheck — dashboard
        working-directory: services/dashboard
        run: govulncheck ./...

  iac-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: tfsec Terraform scan
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: terraform
          soft_fail: false

  terraform-plan:
    runs-on: ubuntu-latest
    needs: iac-security
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: ${{ secrets.AWS_ROLE_SESSION_NAME }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: terraform
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}
        run: terraform plan -no-color 2>&1 | tee plan.txt

      - name: Post plan as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/plan.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.slice(-60000) + '\n...(truncated)' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`\n${truncated}\n\`\`\``
            });

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r app/requirements.txt pytest
      - name: Run unit tests
        run: pytest app/tests/ -v

  build-and-scan:
    runs-on: ubuntu-latest
    needs: [test, secrets-scan, sast-python, sast-go]
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: ${{ secrets.AWS_ROLE_SESSION_NAME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build all images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          PR_TAG: pr-${{ github.event.pull_request.number }}
        run: |
          docker build -t $ECR_REGISTRY/url-demo-project/api:$PR_TAG ./app
          docker build -t $ECR_REGISTRY/url-demo-project/worker:$PR_TAG ./services/worker
          docker build -t $ECR_REGISTRY/url-demo-project/dashboard:$PR_TAG ./services/dashboard

      - name: Trivy scan — api
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/url-demo-project/api:pr-${{ github.event.pull_request.number }}
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Trivy scan — worker
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/url-demo-project/worker:pr-${{ github.event.pull_request.number }}
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Trivy scan — dashboard
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/url-demo-project/dashboard:pr-${{ github.event.pull_request.number }}
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Push PR images to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          PR_TAG: pr-${{ github.event.pull_request.number }}
        run: |
          docker push $ECR_REGISTRY/url-demo-project/api:$PR_TAG
          docker push $ECR_REGISTRY/url-demo-project/worker:$PR_TAG
          docker push $ECR_REGISTRY/url-demo-project/dashboard:$PR_TAG

name: CI

on:
  pull_request:
    branches: [main]

env:
  AWS_REGION: eu-west-2

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r app/requirements.txt pytest

      - name: Run unit tests
        run: pytest app/tests/ -v

  build-and-scan:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: ${{ secrets.AWS_ROLE_SESSION_NAME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          PR_TAG: pr-${{ github.event.pull_request.number }}
        run: |
          docker build -t $ECR_REGISTRY/project-demo/api:$PR_TAG ./app
          docker build -t $ECR_REGISTRY/project-demo/worker:$PR_TAG ./services/worker
          docker build -t $ECR_REGISTRY/project-demo/dashboard:$PR_TAG ./services/dashboard

      - name: Scan images with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: project-demo/api:pr-${{ github.event.pull_request.number }}
          format: table
          exit-code: 1
          severity: CRITICAL

      - name: Push PR images to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          PR_TAG: pr-${{ github.event.pull_request.number }}
        run: |
          docker push $ECR_REGISTRY/project-demo/api:$PR_TAG
          docker push $ECR_REGISTRY/project-demo/worker:$PR_TAG
          docker push $ECR_REGISTRY/project-demo/dashboard:$PR_TAG
